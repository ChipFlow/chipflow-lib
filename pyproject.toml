# Package sources

[[tool.pdm.source]]
name = "chipflow-amaranth-vexriscv"
url = "https://gitlab.com/api/v4/projects/33096707/packages/pypi/simple"

# Project metadata

[tool.pdm.version]
source = "scm"

[project]
name = "chipflow-lib"
dynamic = ["version"]
description = "ChipFlow common tools."
authors = [
    {name = "Robert Taylor", email = "rob.taylor@chipflow.io>" },
    {name = "Ross Motley", email = "ross.motley@chipflow.io>" },
    {name = "Catherine Zotova", email = "catherine.zotova@chipflow.io>" },
]
license = {file = "LICENSE.md"}

requires-python = "~=3.8"
dependencies = [
    "amaranth @ git+https://github.com/amaranth-lang/amaranth@d32ca043263c04bdd78b64fa912185a61169a683",
    "amaranth-soc @ git+https://github.com/amaranth-lang/amaranth-soc@59223a82399df45addf1db362ad6fb9670e72b51",
    "amaranth-boards @ git+https://github.com/amaranth-lang/amaranth-boards",
    "amaranth-stdio @ git+https://github.com/amaranth-lang/amaranth-stdio@bb39058bd956cf89379c7cde9404998476470a07",
    "amaranth-orchard @ git+https://gitlab.com/ChipFlow/amaranth-orchard@97703a061d248cd27d4f7381582cc9c5d66b299c",
    "amaranth-vexriscv @  git+https://gitlab.com/ChipFlow/amaranth-vexriscv",
    "yowasp-yosys~=0.32.0.0",
    "yowasp-nextpnr-ecp5~=0.6.0.0",
    "yowasp-runtime~=1.32",
    "tomli~=2.0.1",
    "jsonschema~=4.17.3",
    "doit~=0.36.0",
    "requests~=2.30.0",
]

[tool.pdm.resolution.overrides]
# We need this to override reqs like "amaranth<0.5,>=0.3"
amaranth = "git+https://github.com/amaranth-lang/amaranth@d32ca043263c04bdd78b64fa912185a61169a683"

[project.scripts]
chipflow = "chipflow_lib.cli:run"

# Build system configuration

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

# Development workflow configuration

[tool.pdm.dev-dependencies]
test = [
    "pytest~=7.2.0",
]
lint = [
    "pycodestyle~=2.10.0",
]

[tool.pdm.scripts]
test.cmd = "pytest"
lint.cmd = "pycodestyle --config=./.pycodestyle chipflow_lib"
